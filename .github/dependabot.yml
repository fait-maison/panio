version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      svelte:
        patterns:
          - "svelte"
          - "svelte-check"
          - "@sveltejs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
          - "tailwind-variants"
          - "tw-animate-css"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      playwright:
        patterns:
          - "@playwright/test"
      shadcn:
        patterns:
          - "bits-ui"
          - "svelte-sonner"
    ignore:
      - dependency-name: vite
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@sveltejs/*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
