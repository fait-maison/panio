<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Panio — Style C: Bold Brutalist</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				--bg: #f5f5f0;
				--surface: #ffffff;
				--text: #111111;
				--text-muted: #777777;
				--red: #cc2936;
				--blue: #1d4ed8;
				--border: #111111;
				--border-light: #dddddd;
				--font: 'Space Grotesk', system-ui, sans-serif;
				--font-mono: 'Space Mono', monospace;
				--shadow: 4px 4px 0 #111;
			}

			html,
			body {
				height: 100%;
				font-family: var(--font);
				background: var(--bg);
				color: var(--text);
			}

			/* ── Navbar ── */
			nav {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				height: 56px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 24px;
				background: var(--text);
				color: var(--surface);
				z-index: 100;
			}
			.logo {
				font-family: var(--font-mono);
				font-size: 1.2rem;
				font-weight: 700;
				letter-spacing: 0.1em;
				text-transform: uppercase;
			}
			.nav-item {
				font-size: 0.7rem;
				font-weight: 500;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: #888;
			}
			.nav-item.active {
				color: #fff;
				background: var(--red);
				padding: 4px 10px;
				border-radius: 0;
			}
			.gear {
				background: none;
				border: 2px solid #555;
				border-radius: 0;
				width: 36px;
				height: 36px;
				display: flex;
				align-items: center;
				justify-content: center;
				color: #888;
				cursor: pointer;
				transition: all 0.15s;
			}
			.gear:hover {
				border-color: var(--red);
				color: white;
			}

			/* ── Main layout ── */
			main {
				display: flex;
				flex-direction: column;
				align-items: center;
				min-height: 100vh;
				padding: 88px 16px 100px;
				gap: 48px;
			}

			/* ── Ambiance Card ── */
			.ambiance-card {
				background: var(--surface);
				border: 3px solid var(--border);
				box-shadow: var(--shadow);
				min-width: 480px;
				overflow: hidden;
				position: relative;
			}
			.card-content {
				padding: 36px 32px 24px;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 6px;
				position: relative;
			}
			.badge {
				display: flex;
				align-items: baseline;
				gap: 16px;
			}
			.key-letter {
				font-family: var(--font-mono);
				font-size: 4rem;
				font-weight: 700;
				color: var(--red);
				line-height: 1;
			}
			.mode-name {
				font-family: var(--font-mono);
				font-size: 2.8rem;
				font-weight: 700;
				letter-spacing: 0.06em;
				text-transform: uppercase;
				line-height: 1;
			}
			.texture {
				font-family: var(--font-mono);
				font-size: 0.8rem;
				color: var(--text-muted);
				letter-spacing: 0.06em;
				margin-top: 4px;
			}
			.mood-tag {
				display: inline-block;
				margin-top: 6px;
				font-size: 0.65rem;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.1em;
				color: var(--surface);
				background: var(--text);
				padding: 4px 12px;
			}
			.prog-sep {
				width: 100%;
				height: 3px;
				background: var(--border);
				margin: 12px 0 8px;
			}
			.progression {
				display: flex;
				align-items: center;
				gap: 8px;
				font-family: var(--font-mono);
				font-size: 1.1rem;
				font-weight: 700;
				letter-spacing: 0.04em;
			}
			.chord {
				color: var(--text);
				cursor: pointer;
				padding: 4px 10px;
				border: 2px solid transparent;
				transition: all 0.1s;
			}
			.chord:hover {
				border-color: var(--red);
			}
			.chord.tonic {
				color: var(--surface);
				background: var(--red);
			}
			.arrow {
				color: var(--text-muted);
				font-weight: 400;
				font-size: 1.4rem;
			}
			.skip-btn {
				position: absolute;
				top: 12px;
				right: 12px;
				background: var(--text);
				border: none;
				color: var(--surface);
				cursor: pointer;
				padding: 6px;
				display: flex;
				transition: background 0.15s;
			}
			.skip-btn:hover {
				background: var(--red);
			}
			.progress-bar {
				height: 6px;
				background: var(--border-light);
			}
			.progress-fill {
				height: 100%;
				width: 65%;
				background: var(--red);
			}

			/* ── Piano Keyboard ── */
			.keyboard-scroll {
				width: 100%;
				overflow-x: auto;
				display: flex;
				padding-bottom: 8px;
			}
			.keyboard {
				position: relative;
				margin: 0 auto;
				width: 1520px;
				height: 130px;
			}
			.key-el {
				position: absolute;
				top: 0;
				border-radius: 0;
				cursor: pointer;
				user-select: none;
			}
			.white-key {
				width: 29px;
				height: 130px;
				background: #ffffff;
				border: 1px solid #aaa;
				z-index: 1;
			}
			.white-key.in-scale {
				background: #ffe0e0;
				border-color: #cc2936;
			}
			.white-key.is-root {
				background: #cc2936;
				border-color: #cc2936;
			}
			.white-key.pressed {
				background: var(--blue);
				border-color: var(--blue);
			}
			.black-key {
				width: 17px;
				height: 80px;
				background: var(--text);
				z-index: 2;
			}
			.black-key.in-scale {
				background: #ef4444;
			}
			.black-key.pressed {
				background: var(--blue);
			}

			/* ── Style tag ── */
			.style-tag {
				position: fixed;
				bottom: 16px;
				left: 16px;
				background: var(--surface);
				border: 3px solid var(--border);
				padding: 8px 16px;
				font-size: 0.75rem;
				color: var(--text-muted);
				box-shadow: var(--shadow);
			}
			.style-tag strong {
				color: var(--text);
			}
		</style>
	</head>
	<body>
		<nav>
			<span class="logo">Panio</span>
			<div style="display: flex; gap: 20px; align-items: center">
				<span class="nav-item active">Sandbox</span>
			</div>
			<button class="gear">
				<svg
					width="18"
					height="18"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
				>
					<circle cx="12" cy="12" r="3" />
					<path
						d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
					/>
				</svg>
			</button>
		</nav>

		<main>
			<div class="ambiance-card">
				<div class="card-content">
					<button class="skip-btn" aria-label="Next ambiance">
						<svg
							width="14"
							height="14"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<polygon points="5 4 15 12 5 20 5 4" />
							<line x1="19" y1="5" x2="19" y2="19" />
						</svg>
					</button>
					<div class="badge">
						<span class="key-letter">D</span>
						<span class="mode-name">DORIAN</span>
					</div>
					<div class="texture">sparse // pedal tone</div>
					<span class="mood-tag">melancholic, bittersweet</span>
					<div class="prog-sep"></div>
					<div class="progression">
						<span class="chord tonic">Dm7</span>
						<span class="arrow">&rarr;</span>
						<span class="chord">G7</span>
						<span class="arrow">&rarr;</span>
						<span class="chord">Am7</span>
						<span class="arrow">&rarr;</span>
						<span class="chord">Em7</span>
					</div>
				</div>
				<div class="progress-bar"><div class="progress-fill"></div></div>
			</div>

			<div class="keyboard-scroll">
				<div class="keyboard" id="piano"></div>
			</div>
		</main>

		<div class="style-tag">
			<strong>Style C — Bold Brutalist</strong><br />
			Space Mono headings &middot; hard shadows &middot; sharp edges &middot; high contrast<br />
			Feels like: a rehearsal studio poster
		</div>

		<script>
			const kb = document.getElementById('piano');
			const BLACK = new Set([1, 3, 6, 8, 10]);
			const SCALE = new Set([2, 4, 5, 7, 9, 11, 0]);
			const ROOT = 2;
			const PRESSED = new Set([62, 66, 69]);
			let whiteIdx = 0,
				lastWhiteLeft = 0;
			for (let midi = 21; midi <= 108; midi++) {
				const pc = midi % 12;
				const isBlack = BLACK.has(pc);
				const div = document.createElement('div');
				div.className = 'key-el ' + (isBlack ? 'black-key' : 'white-key');
				if (!isBlack) {
					const left = whiteIdx * 30;
					div.style.left = left + 'px';
					if (PRESSED.has(midi)) div.classList.add('pressed');
					else if (pc === ROOT && SCALE.has(pc)) div.classList.add('is-root');
					else if (SCALE.has(pc)) div.classList.add('in-scale');
					lastWhiteLeft = left;
					whiteIdx++;
				} else {
					div.style.left = lastWhiteLeft + 29 - 8 + 'px';
					if (PRESSED.has(midi)) div.classList.add('pressed');
					else if (SCALE.has(pc)) div.classList.add('in-scale');
				}
				kb.appendChild(div);
			}
			const scroll = document.querySelector('.keyboard-scroll');
			setTimeout(() => {
				scroll.scrollLeft = 520;
			}, 100);
		</script>
	</body>
</html>
