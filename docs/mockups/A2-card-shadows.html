<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panio — Card Shadow Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F0E8;
    --surface: #FFFDF9;
    --text: #1A1A1A;
    --text-muted: #8A8078;
    --red: #CC2936;
    --border: #E8E0D4;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }

  html, body { height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--text); }

  main {
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 16px;
    gap: 48px;
  }

  h2 {
    font-family: var(--font-body);
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: -24px;
  }

  .card {
    background: var(--surface);
    min-width: 420px;
    overflow: hidden;
    position: relative;
  }
  .card-content {
    padding: 36px 28px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .badge { display: flex; align-items: baseline; gap: 12px; }
  .key-letter {
    font-family: var(--font-display);
    font-size: 2.2rem; color: var(--red);
  }
  .separator { font-size: 1.4rem; color: var(--text-muted); }
  .mode-name {
    font-family: var(--font-display);
    font-size: 2rem; letter-spacing: 0.03em;
  }
  .texture {
    font-size: 0.9rem; color: var(--text-muted); font-style: italic;
    letter-spacing: 0.04em;
  }
  .prog-sep { width: 80%; height: 1px; background: var(--border); margin: 8px 0; }
  .progression {
    display: flex; align-items: center; gap: 10px;
    font-size: 1rem; font-weight: 600; letter-spacing: 0.06em;
  }
  .chord { color: var(--text); }
  .chord.tonic { color: var(--red); }
  .arrow { color: var(--text-muted); font-weight: 400; }
  .progress-bar { height: 4px; background: #EEE8DD; }
  .progress-fill { height: 100%; width: 65%; background: var(--red); }

  /* ── Option A: shadow + thin border ── */
  .card-a {
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  /* ── Option B: no border, just shadow ── */
  .card-b {
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }

  /* ── Option C: stronger shadow, no border ── */
  .card-c {
    border: none;
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
    transition: box-shadow 0.25s ease, transform 0.25s ease;
    cursor: default;
  }
  .card-c:hover {
    box-shadow: 0 12px 48px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.06);
    transform: translateY(-2px);
  }

  .label {
    position: absolute; top: 10px; left: 14px;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--surface);
    background: var(--text); padding: 3px 8px; border-radius: 4px;
  }
</style>
</head>
<body>

<main>
  <h2>Option A — Shadow + Thin Border</h2>
  <div class="card card-a">
    <span class="label">A</span>
    <div class="card-content">
      <div class="badge">
        <span class="key-letter">D</span>
        <span class="separator">&middot;</span>
        <span class="mode-name">DORIAN</span>
      </div>
      <div class="texture">sparse &middot; pedal tone</div>
      <div class="prog-sep"></div>
      <div class="progression">
        <span class="chord tonic">Dm7</span>
        <span class="arrow">&rsaquo;</span>
        <span class="chord">G7</span>
        <span class="arrow">&rsaquo;</span>
        <span class="chord">Am7</span>
        <span class="arrow">&rsaquo;</span>
        <span class="chord">Em7</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <h2>Option B — No Border, Shadow Only</h2>
  <div class="card card-b">
    <span class="label">B</span>
    <div class="card-content">
      <div class="badge">
        <span class="key-letter">D</span>
        <span class="separator">&middot;</span>
        <span class="mode-name">DORIAN</span>
      </div>
      <div class="texture">sparse &middot; pedal tone</div>
      <div class="prog-sep"></div>
      <div class="progression">
        <span class="chord tonic">Dm7</span>
        <span class="arrow">&rsaquo;</span>
        <span class="chord">G7</span>
        <span class="arrow">&rsaquo;</span>
        <span class="chord">Am7</span>
        <span class="arrow">&rsaquo;</span>
        <span class="chord">Em7</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <h2>Option C — Stronger Shadow, No Border (Lifted)</h2>
  <div class="card card-c">
    <span class="label">C</span>
    <div class="card-content">
      <div class="badge">
        <span class="key-letter">D</span>
        <span class="separator">&middot;</span>
        <span class="mode-name">DORIAN</span>
      </div>
      <div class="texture">sparse &middot; pedal tone</div>
      <div class="prog-sep"></div>
      <div class="progression">
        <span class="chord tonic">Dm7</span>
        <span class="arrow">&rsaquo;</span>
        <span class="chord">G7</span>
        <span class="arrow">&rsaquo;</span>
        <span class="chord">Am7</span>
        <span class="arrow">&rsaquo;</span>
        <span class="chord">Em7</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>
</main>

</body>
</html>
