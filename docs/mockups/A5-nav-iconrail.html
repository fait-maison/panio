<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panio — Nav A: Icon Rail</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F0E8;
    --surface: #FFFDF9;
    --text: #1A1A1A;
    --text-muted: #8A8078;
    --red: #CC2936;
    --red-light: #FECACA;
    --blue: #1D4ED8;
    --border: #E8E0D4;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --radius: 14px;
    --rail-w: 56px;
    --rail-expanded: 220px;
  }

  html, body { height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--text); overflow: hidden; }

  /* ── Icon Rail ── */
  .rail {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: var(--rail-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center;
    padding: 12px 0;
    z-index: 100;
    transition: width 0.25s ease;
    overflow: hidden;
  }
  .rail:hover { width: var(--rail-expanded); }

  .rail-logo {
    font-family: var(--font-display);
    font-size: 1.2rem;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    white-space: nowrap;
    overflow: hidden;
    transition: width 0.25s ease;
  }
  .rail:hover .rail-logo { width: calc(var(--rail-expanded) - 24px); justify-content: flex-start; padding-left: 4px; }
  .rail-logo .full { display: none; }
  .rail:hover .rail-logo .short { display: none; }
  .rail:hover .rail-logo .full { display: inline; }

  .rail-sep { width: 32px; height: 1px; background: var(--border); margin: 4px 0 8px; transition: width 0.25s; }
  .rail:hover .rail-sep { width: calc(var(--rail-expanded) - 24px); }

  .rail-item {
    display: flex; align-items: center; gap: 12px;
    width: 40px; height: 40px;
    padding: 0; margin: 2px 0;
    border: none; background: none;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 0.8rem; font-weight: 500;
    color: var(--text-muted);
    cursor: pointer; transition: all 0.2s;
    overflow: hidden; white-space: nowrap;
    justify-content: center;
  }
  .rail:hover .rail-item {
    width: calc(var(--rail-expanded) - 16px);
    padding: 0 12px;
    justify-content: flex-start;
  }
  .rail-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
  .rail-item.active { background: rgba(204,41,54,0.08); color: var(--red); font-weight: 600; }
  .rail-item .icon { font-size: 1.15rem; flex-shrink: 0; width: 20px; text-align: center; }
  .rail-item .label { opacity: 0; transition: opacity 0.15s; }
  .rail:hover .rail-item .label { opacity: 1; }
  .rail-item .soon { margin-left: auto; font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); background: rgba(0,0,0,0.06); padding: 2px 5px; border-radius: 3px; opacity: 0; transition: opacity 0.15s; }
  .rail:hover .rail-item .soon { opacity: 1; }

  .rail-bottom {
    margin-top: auto;
  }

  /* ── Main content ── */
  .main-area {
    margin-left: var(--rail-w);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
    padding: 40px 16px 100px;
    gap: 36px;
    overflow-y: auto;
    transition: margin-left 0.25s ease;
  }

  /* ── Card ── */
  .ambiance-card {
    background: var(--surface); border: none; border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
    min-width: 460px; overflow: hidden; position: relative;
    transition: box-shadow 0.25s ease, transform 0.25s ease;
  }
  .ambiance-card:hover { box-shadow: 0 12px 48px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.06); transform: translateY(-2px); }
  .card-content { padding: 40px 32px 28px; display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
  .badge { display: flex; align-items: baseline; gap: 12px; }
  .key-letter { font-family: var(--font-display); font-size: 2.2rem; color: var(--red); }
  .separator { font-size: 1.4rem; color: var(--text-muted); }
  .mode-name { font-family: var(--font-display); font-size: 2rem; }
  .texture { font-size: 0.95rem; color: var(--text-muted); font-style: italic; }
  .prog-sep { width: 80%; height: 1px; background: var(--border); margin: 8px 0; }
  .progression { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 600; }
  .chord { color: var(--text); } .chord.tonic { color: var(--red); }
  .arrow { color: var(--text-muted); }
  .skip-btn { position: absolute; bottom: 12px; right: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; }
  .progress-bar { height: 4px; background: #EEE8DD; }
  .progress-fill { height: 100%; width: 65%; background: var(--red); }

  .keyboard-scroll { width: 100%; overflow-x: auto; display: flex; padding-bottom: 8px; }
  .keyboard { position: relative; margin: 0 auto; width: 1520px; height: 130px; }
  .key-el { position: absolute; top: 0; cursor: pointer; user-select: none; }
  .white-key { width: 29px; height: 130px; background: #FFFDF9; border: 1px solid #ccc; border-radius: 0 0 4px 4px; z-index: 1; }
  .white-key.in-scale { background: var(--red-light); }
  .white-key.is-root { background: radial-gradient(circle at 50% 91%, var(--red) 3px, transparent 4px), var(--red-light); }
  .white-key.pressed { background: var(--blue); border-color: var(--blue); }
  .black-key { width: 17px; height: 80px; background: linear-gradient(180deg, #1A1A1A, #2A2A2A); border-radius: 0 0 3px 3px; z-index: 2; box-shadow: 0 3px 6px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2); }
  .black-key.in-scale { background: #EF4444; }
  .black-key.pressed { background: var(--blue); }

  .style-tag {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 12px;
    font-size: 0.75rem; color: var(--text-muted);
    box-shadow: 0 4px 16px rgba(0,0,0,0.06); z-index: 200;
  }
  .style-tag strong { color: var(--text); }
</style>
</head>
<body>

<aside class="rail">
  <div class="rail-logo">
    <span class="short">P</span>
    <span class="full">Panio</span>
  </div>
  <div class="rail-sep"></div>
  <button class="rail-item active">
    <span class="icon">🎹</span>
    <span class="label">Sandbox</span>
  </button>
  <button class="rail-item">
    <span class="icon">🎬</span>
    <span class="label">Scene Prompt</span>
    <span class="soon">Soon</span>
  </button>
  <button class="rail-item">
    <span class="icon">👂</span>
    <span class="label">Ear Training</span>
    <span class="soon">Soon</span>
  </button>
  <button class="rail-item">
    <span class="icon">🥁</span>
    <span class="label">Rhythm</span>
    <span class="soon">Soon</span>
  </button>
  <div class="rail-bottom">
    <button class="rail-item">
      <span class="icon">⚙️</span>
      <span class="label">Settings</span>
    </button>
  </div>
</aside>

<div class="main-area">
  <div class="ambiance-card">
    <div class="card-content">
      <button class="skip-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
      <div class="badge">
        <span class="key-letter">D</span><span class="separator">&middot;</span><span class="mode-name">DORIAN</span>
      </div>
      <div class="texture">sparse &middot; pedal tone</div>
      <div class="prog-sep"></div>
      <div class="progression">
        <span class="chord tonic">Dm7</span><span class="arrow">&rsaquo;</span>
        <span class="chord">G7</span><span class="arrow">&rsaquo;</span>
        <span class="chord">Am7</span><span class="arrow">&rsaquo;</span>
        <span class="chord">Em7</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>
  <div class="keyboard-scroll"><div class="keyboard" id="piano"></div></div>
</div>

<div class="style-tag">
  <strong>Option A — Icon Rail</strong><br>
  56px collapsed &middot; expands to 220px on hover &middot; always visible<br>
  Hover the left edge to see it expand
</div>

<script>
  const kb = document.getElementById('piano');
  const BLACK = new Set([1,3,6,8,10]);
  const SCALE = new Set([2,4,5,7,9,11,0]);
  const ROOT = 2; const PRESSED = new Set([62,66,69]);
  let wi = 0, lw = 0;
  for (let m = 21; m <= 108; m++) {
    const pc = m%12, ib = BLACK.has(pc), d = document.createElement('div');
    d.className = 'key-el '+(ib?'black-key':'white-key');
    if (!ib) { const l=wi*30; d.style.left=l+'px'; if(PRESSED.has(m))d.classList.add('pressed'); else if(pc===ROOT&&SCALE.has(pc))d.classList.add('is-root'); else if(SCALE.has(pc))d.classList.add('in-scale'); lw=l; wi++; }
    else { d.style.left=(lw+29-8)+'px'; if(PRESSED.has(m))d.classList.add('pressed'); else if(SCALE.has(pc))d.classList.add('in-scale'); }
    kb.appendChild(d);
  }
  document.querySelector('.keyboard-scroll').scrollLeft = 520;
</script>
</body>
</html>
