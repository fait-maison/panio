<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Panio — Keyboard A: Fixed at Bottom</title>
		<link
			href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				--bg: #f5f0e8;
				--surface: #fffdf9;
				--text: #1a1a1a;
				--text-muted: #8a8078;
				--red: #cc2936;
				--red-light: #fecaca;
				--blue: #1d4ed8;
				--border: #e8e0d4;
				--font-display: 'DM Serif Display', Georgia, serif;
				--font-body: 'Inter', system-ui, sans-serif;
				--radius: 14px;
				--kb-height: 140px;
			}

			html,
			body {
				height: 100%;
				font-family: var(--font-body);
				background: var(--bg);
				color: var(--text);
			}

			.topbar {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				height: 52px;
				display: flex;
				align-items: center;
				gap: 12px;
				padding: 0 16px;
				background: var(--bg);
				z-index: 100;
			}
			.hamburger {
				background: none;
				border: none;
				width: 40px;
				height: 40px;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 5px;
				cursor: pointer;
				border-radius: 8px;
			}
			.hamburger span {
				display: block;
				width: 18px;
				height: 2px;
				background: var(--text);
				border-radius: 1px;
			}
			.logo {
				font-family: var(--font-display);
				font-size: 1.3rem;
			}

			/* ── Content area above keyboard ── */
			main {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: calc(100vh - var(--kb-height));
				padding: 52px 16px 16px;
				gap: 20px;
			}

			.ambiance-card {
				background: var(--surface);
				border: none;
				border-radius: var(--radius);
				box-shadow:
					0 8px 40px rgba(0, 0, 0, 0.1),
					0 2px 8px rgba(0, 0, 0, 0.04);
				min-width: 460px;
				overflow: hidden;
				position: relative;
				transition:
					box-shadow 0.25s ease,
					transform 0.25s ease;
			}
			.ambiance-card:hover {
				box-shadow:
					0 12px 48px rgba(0, 0, 0, 0.14),
					0 4px 12px rgba(0, 0, 0, 0.06);
				transform: translateY(-2px);
			}
			.card-content {
				padding: 36px 32px 24px;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 8px;
				position: relative;
			}
			.badge {
				display: flex;
				align-items: baseline;
				gap: 12px;
			}
			.key-letter {
				font-family: var(--font-display);
				font-size: 2.2rem;
				color: var(--red);
			}
			.separator {
				font-size: 1.4rem;
				color: var(--text-muted);
			}
			.mode-name {
				font-family: var(--font-display);
				font-size: 2rem;
			}
			.texture {
				font-size: 0.95rem;
				color: var(--text-muted);
				font-style: italic;
			}
			.prog-sep {
				width: 80%;
				height: 1px;
				background: var(--border);
				margin: 8px 0;
			}
			.progression {
				display: flex;
				align-items: center;
				gap: 10px;
				font-size: 1rem;
				font-weight: 600;
			}
			.chord {
				color: var(--text);
			}
			.chord.tonic {
				color: var(--red);
			}
			.arrow {
				color: var(--text-muted);
			}
			.card-actions {
				position: absolute;
				top: 10px;
				right: 10px;
				display: flex;
				gap: 4px;
			}
			.action-btn {
				background: none;
				border: none;
				color: var(--text-muted);
				cursor: pointer;
				padding: 6px;
				border-radius: 8px;
				display: flex;
				transition: all 0.15s;
			}
			.action-btn:hover {
				color: var(--text);
				background: rgba(0, 0, 0, 0.04);
			}
			.progress-bar {
				height: 4px;
				background: #eee8dd;
			}
			.progress-fill {
				height: 100%;
				width: 65%;
				background: var(--red);
			}

			/* ── Fixed Keyboard ── */
			.keyboard-dock {
				position: fixed;
				bottom: 0;
				left: 0;
				right: 0;
				height: var(--kb-height);
				background: var(--surface);
				border-top: 1px solid var(--border);
				box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
				z-index: 90;
				overflow-x: auto;
				overflow-y: hidden;
				display: flex;
				align-items: flex-start;
				padding-top: 8px;
			}
			.keyboard {
				position: relative;
				margin: 0 auto;
				width: 1520px;
				height: 130px;
			}
			.key-el {
				position: absolute;
				top: 0;
				cursor: pointer;
				user-select: none;
			}
			.white-key {
				width: 29px;
				height: 130px;
				background: #fffdf9;
				border: 1px solid #ccc;
				border-radius: 0 0 4px 4px;
				z-index: 1;
			}
			.white-key.in-scale {
				background: var(--red-light);
			}
			.white-key.is-root {
				background:
					radial-gradient(circle at 50% 91%, var(--red) 3px, transparent 4px), var(--red-light);
			}
			.white-key.pressed {
				background: var(--blue);
				border-color: var(--blue);
			}
			.black-key {
				width: 17px;
				height: 80px;
				background: linear-gradient(180deg, #1a1a1a, #2a2a2a);
				border-radius: 0 0 3px 3px;
				z-index: 2;
				box-shadow:
					0 3px 6px rgba(0, 0, 0, 0.3),
					0 1px 2px rgba(0, 0, 0, 0.2);
			}
			.black-key.in-scale {
				background: #ef4444;
			}
			.black-key.pressed {
				background: var(--blue);
			}

			.style-tag {
				position: fixed;
				bottom: calc(var(--kb-height) + 12px);
				right: 16px;
				background: var(--surface);
				border: 1px solid var(--border);
				padding: 8px 16px;
				border-radius: 12px;
				font-size: 0.75rem;
				color: var(--text-muted);
				box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
				z-index: 200;
			}
			.style-tag strong {
				color: var(--text);
			}
		</style>
	</head>
	<body>
		<div class="topbar">
			<button class="hamburger"><span></span><span></span><span></span></button>
			<span class="logo">Panio</span>
		</div>

		<main>
			<div class="ambiance-card">
				<div class="card-content">
					<div class="card-actions">
						<button class="action-btn">
							<svg
								width="16"
								height="16"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<line x1="4" y1="21" x2="4" y2="14" />
								<line x1="4" y1="10" x2="4" y2="3" />
								<line x1="12" y1="21" x2="12" y2="12" />
								<line x1="12" y1="8" x2="12" y2="3" />
								<line x1="20" y1="21" x2="20" y2="16" />
								<line x1="20" y1="12" x2="20" y2="3" />
								<line x1="1" y1="14" x2="7" y2="14" />
								<line x1="9" y1="8" x2="15" y2="8" />
								<line x1="17" y1="16" x2="23" y2="16" />
							</svg>
						</button>
						<button class="action-btn">
							<svg
								width="16"
								height="16"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<polygon points="5 4 15 12 5 20 5 4" />
								<line x1="19" y1="5" x2="19" y2="19" />
							</svg>
						</button>
					</div>
					<div class="badge">
						<span class="key-letter">D</span><span class="separator">&middot;</span
						><span class="mode-name">DORIAN</span>
					</div>
					<div class="texture">sparse &middot; pedal tone</div>
					<div class="prog-sep"></div>
					<div class="progression">
						<span class="chord tonic">Dm7</span><span class="arrow">&rsaquo;</span>
						<span class="chord">G7</span><span class="arrow">&rsaquo;</span>
						<span class="chord">Am7</span><span class="arrow">&rsaquo;</span>
						<span class="chord">Em7</span>
					</div>
				</div>
				<div class="progress-bar"><div class="progress-fill"></div></div>
			</div>
		</main>

		<div class="keyboard-dock">
			<div class="keyboard" id="piano"></div>
		</div>

		<div class="style-tag">
			<strong>Option A — Fixed at Bottom</strong><br />
			Keyboard always docked &middot; card centered in remaining space<br />
			Pro: always visible, like a real instrument &middot; Con: eats ~140px of height
		</div>

		<script>
			const kb = document.getElementById('piano');
			const BLACK = new Set([1, 3, 6, 8, 10]);
			const SCALE = new Set([2, 4, 5, 7, 9, 11, 0]);
			const ROOT = 2;
			const PRESSED = new Set([62, 66, 69]);
			let wi = 0,
				lw = 0;
			for (let m = 21; m <= 108; m++) {
				const pc = m % 12,
					ib = BLACK.has(pc),
					d = document.createElement('div');
				d.className = 'key-el ' + (ib ? 'black-key' : 'white-key');
				if (!ib) {
					const l = wi * 30;
					d.style.left = l + 'px';
					if (PRESSED.has(m)) d.classList.add('pressed');
					else if (pc === ROOT && SCALE.has(pc)) d.classList.add('is-root');
					else if (SCALE.has(pc)) d.classList.add('in-scale');
					lw = l;
					wi++;
				} else {
					d.style.left = lw + 29 - 8 + 'px';
					if (PRESSED.has(m)) d.classList.add('pressed');
					else if (SCALE.has(pc)) d.classList.add('in-scale');
				}
				kb.appendChild(d);
			}
			document.querySelector('.keyboard-dock').scrollLeft = 520;
		</script>
	</body>
</html>
