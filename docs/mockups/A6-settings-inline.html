<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panio — Settings A: Inline Collapsible</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F0E8;
    --surface: #FFFDF9;
    --text: #1A1A1A;
    --text-muted: #8A8078;
    --red: #CC2936;
    --red-light: #FECACA;
    --blue: #1D4ED8;
    --border: #E8E0D4;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --radius: 14px;
  }

  html, body { height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--text); }

  /* ── Top bar ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px;
    background: var(--bg); z-index: 100;
  }
  .hamburger {
    background: none; border: none; width: 40px; height: 40px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; cursor: pointer; border-radius: 8px; transition: background 0.15s;
  }
  .hamburger:hover { background: rgba(0,0,0,0.05); }
  .hamburger span { display: block; width: 18px; height: 2px; background: var(--text); border-radius: 1px; }
  .logo { font-family: var(--font-display); font-size: 1.3rem; }

  /* ── Main ── */
  main {
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
    padding: 72px 16px 100px;
    gap: 20px;
  }

  /* ── Card ── */
  .ambiance-card {
    background: var(--surface); border: none; border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
    min-width: 460px; overflow: hidden; position: relative;
    transition: box-shadow 0.25s ease, transform 0.25s ease;
  }
  .ambiance-card:hover { box-shadow: 0 12px 48px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.06); transform: translateY(-2px); }
  .card-content { padding: 40px 32px 28px; display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
  .badge { display: flex; align-items: baseline; gap: 12px; }
  .key-letter { font-family: var(--font-display); font-size: 2.2rem; color: var(--red); }
  .separator { font-size: 1.4rem; color: var(--text-muted); }
  .mode-name { font-family: var(--font-display); font-size: 2rem; }
  .texture { font-size: 0.95rem; color: var(--text-muted); font-style: italic; }
  .prog-sep { width: 80%; height: 1px; background: var(--border); margin: 8px 0; }
  .progression { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 600; }
  .chord { color: var(--text); } .chord.tonic { color: var(--red); }
  .arrow { color: var(--text-muted); }
  .skip-btn { position: absolute; bottom: 12px; right: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; }
  .progress-bar { height: 4px; background: #EEE8DD; }
  .progress-fill { height: 100%; width: 65%; background: var(--red); }

  /* ── Inline Settings Panel ── */
  .inline-settings {
    background: var(--surface);
    border: none; border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.03);
    min-width: 460px; max-width: 460px;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .settings-toggle {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px 24px;
    background: none; border: none;
    font-family: var(--font-body);
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted); cursor: pointer;
    transition: color 0.15s;
  }
  .settings-toggle:hover { color: var(--text); }
  .settings-toggle .chevron { transition: transform 0.25s; font-size: 0.8rem; }
  .settings-toggle.open .chevron { transform: rotate(180deg); }

  .settings-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s ease;
    padding: 0 24px;
  }
  .settings-body.open {
    max-height: 500px;
    padding: 0 24px 20px;
  }

  .setting-group {
    margin-bottom: 16px;
  }
  .setting-group:last-child { margin-bottom: 0; }
  .setting-label {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 8px;
  }
  .chip-row {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .chip {
    padding: 5px 12px; border-radius: 8px;
    font-size: 0.75rem; font-weight: 600;
    border: 1px solid var(--border);
    background: none; color: var(--text-muted);
    cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { border-color: var(--text-muted); color: var(--text); }
  .chip.active { background: rgba(204,41,54,0.08); border-color: var(--red); color: var(--red); }

  /* ── Keyboard ── */
  .keyboard-scroll { width: 100%; overflow-x: auto; display: flex; padding-bottom: 8px; }
  .keyboard { position: relative; margin: 0 auto; width: 1520px; height: 130px; }
  .key-el { position: absolute; top: 0; cursor: pointer; user-select: none; }
  .white-key { width: 29px; height: 130px; background: #FFFDF9; border: 1px solid #ccc; border-radius: 0 0 4px 4px; z-index: 1; }
  .white-key.in-scale { background: var(--red-light); }
  .white-key.is-root { background: radial-gradient(circle at 50% 91%, var(--red) 3px, transparent 4px), var(--red-light); }
  .white-key.pressed { background: var(--blue); border-color: var(--blue); }
  .black-key { width: 17px; height: 80px; background: linear-gradient(180deg, #1A1A1A, #2A2A2A); border-radius: 0 0 3px 3px; z-index: 2; box-shadow: 0 3px 6px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2); }
  .black-key.in-scale { background: #EF4444; }
  .black-key.pressed { background: var(--blue); }

  .style-tag {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 12px;
    font-size: 0.75rem; color: var(--text-muted);
    box-shadow: 0 4px 16px rgba(0,0,0,0.06); z-index: 200;
  }
  .style-tag strong { color: var(--text); }
</style>
</head>
<body>

<div class="topbar">
  <button class="hamburger"><span></span><span></span><span></span></button>
  <span class="logo">Panio</span>
</div>

<main>
  <div class="ambiance-card">
    <div class="card-content">
      <button class="skip-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
      <div class="badge">
        <span class="key-letter">D</span><span class="separator">&middot;</span><span class="mode-name">DORIAN</span>
      </div>
      <div class="texture">sparse &middot; pedal tone</div>
      <div class="prog-sep"></div>
      <div class="progression">
        <span class="chord tonic">Dm7</span><span class="arrow">&rsaquo;</span>
        <span class="chord">G7</span><span class="arrow">&rsaquo;</span>
        <span class="chord">Am7</span><span class="arrow">&rsaquo;</span>
        <span class="chord">Em7</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <div class="inline-settings">
    <button class="settings-toggle" id="stoggle" onclick="toggleSettings()">
      Exercise settings <span class="chevron">▼</span>
    </button>
    <div class="settings-body" id="sbody">
      <div class="setting-group">
        <div class="setting-label">Interval</div>
        <div class="chip-row">
          <button class="chip">15s</button>
          <button class="chip">1 min</button>
          <button class="chip active">3 min</button>
          <button class="chip">5 min</button>
          <button class="chip">10 min</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Difficulty</div>
        <div class="chip-row">
          <button class="chip active">Simple</button>
          <button class="chip">Rich</button>
          <button class="chip">Complex</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Modes</div>
        <div class="chip-row">
          <button class="chip active">Ionian</button>
          <button class="chip active">Dorian</button>
          <button class="chip active">Phrygian</button>
          <button class="chip active">Lydian</button>
          <button class="chip active">Mixolydian</button>
          <button class="chip active">Aeolian</button>
          <button class="chip">Locrian</button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-label">Keys</div>
        <div class="chip-row">
          <button class="chip active">C</button>
          <button class="chip active">D</button>
          <button class="chip active">E</button>
          <button class="chip active">F</button>
          <button class="chip active">G</button>
          <button class="chip active">A</button>
          <button class="chip active">B</button>
          <button class="chip">C#</button>
          <button class="chip">Eb</button>
          <button class="chip">F#</button>
          <button class="chip">Ab</button>
          <button class="chip">Bb</button>
        </div>
      </div>
    </div>
  </div>

  <div class="keyboard-scroll"><div class="keyboard" id="piano"></div></div>
</main>

<div class="style-tag">
  <strong>Option A — Inline Collapsible</strong><br>
  Click "Exercise settings ▼" to expand &middot; lives between card and keyboard<br>
  Pro: always accessible, quick tweak &middot; Con: pushes keyboard down when open
</div>

<script>
  function toggleSettings() {
    document.getElementById('stoggle').classList.toggle('open');
    document.getElementById('sbody').classList.toggle('open');
  }
  // Start open to show the settings
  toggleSettings();

  const kb = document.getElementById('piano');
  const BLACK = new Set([1,3,6,8,10]);
  const SCALE = new Set([2,4,5,7,9,11,0]);
  const ROOT = 2; const PRESSED = new Set([62,66,69]);
  let wi = 0, lw = 0;
  for (let m = 21; m <= 108; m++) {
    const pc = m%12, ib = BLACK.has(pc), d = document.createElement('div');
    d.className = 'key-el '+(ib?'black-key':'white-key');
    if (!ib) { const l=wi*30; d.style.left=l+'px'; if(PRESSED.has(m))d.classList.add('pressed'); else if(pc===ROOT&&SCALE.has(pc))d.classList.add('is-root'); else if(SCALE.has(pc))d.classList.add('in-scale'); lw=l; wi++; }
    else { d.style.left=(lw+29-8)+'px'; if(PRESSED.has(m))d.classList.add('pressed'); else if(SCALE.has(pc))d.classList.add('in-scale'); }
    kb.appendChild(d);
  }
  document.querySelector('.keyboard-scroll').scrollLeft = 520;
</script>
</body>
</html>
